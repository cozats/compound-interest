<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Interest Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font-serif: 'Instrument Serif', Georgia, serif;
    --font-sans: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius: 10px;
    --radius-sm: 6px;
  }

  [data-theme="dark"] {
    --bg: #0a0a0a;
    --bg-elevated: #111111;
    --bg-subtle: #161616;
    --bg-input: #161616;
    --border: #1e1e1e;
    --border-strong: #2a2a2a;
    --text: #e0e0e0;
    --text-secondary: #8a8a8a;
    --text-muted: #505050;
    --accent: #c8c8c8;
    --accent-soft: rgba(200, 200, 200, 0.06);
    --slider-track: #1e1e1e;
    --slider-thumb-bg: #e0e0e0;
    --slider-thumb-border: #e0e0e0;
    --toggle-bg: #1e1e1e;
    --toggle-knob: #e0e0e0;
    --card-shadow: none;
    --tooltip-bg: #161616;
    --tooltip-border: #2a2a2a;
    --bar-primary: #e0e0e0;
    --bar-secondary: #3a3a3a;
    --divider: #1a1a1a;
  }

  [data-theme="light"] {
    --bg: #fafafa;
    --bg-elevated: #ffffff;
    --bg-subtle: #f5f5f5;
    --bg-input: #f5f5f5;
    --border: #ebebeb;
    --border-strong: #ddd;
    --text: #171717;
    --text-secondary: #6b6b6b;
    --text-muted: #a3a3a3;
    --accent: #171717;
    --accent-soft: rgba(0, 0, 0, 0.03);
    --slider-track: #e5e5e5;
    --slider-thumb-bg: #ffffff;
    --slider-thumb-border: #171717;
    --toggle-bg: #e5e5e5;
    --toggle-knob: #ffffff;
    --card-shadow: 0 1px 2px rgba(0,0,0,0.04);
    --tooltip-bg: #ffffff;
    --tooltip-border: #e5e5e5;
    --bar-primary: #171717;
    --bar-secondary: #d4d4d4;
    --divider: #f0f0f0;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 64px;
    -webkit-font-smoothing: antialiased;
    transition: background 0.35s ease, color 0.35s ease;
  }

  @media (max-width: 720px) {
    body { padding: 24px; }
  }

  #root {
    width: 100%;
  }

  .app-root {
    max-width: 920px;
    width: 100%;
    margin: 0 auto;
  }

  /* ---- Header ---- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 64px;
  }

  .header-text h1 {
    font-family: var(--font-serif);
    font-size: clamp(2.4rem, 5.5vw, 3.6rem);
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 1;
  }

  .header-text h1 em {
    font-style: italic;
  }

  .header-text p {
    color: var(--text-muted);
    font-size: 0.88rem;
    font-weight: 300;
    margin-top: 10px;
    letter-spacing: 0.01em;
  }

  /* ---- Theme toggle ---- */
  .theme-switch {
    position: relative;
    width: 42px;
    height: 22px;
    background: var(--toggle-bg);
    border-radius: 11px;
    cursor: pointer;
    border: 1px solid var(--border);
    padding: 0;
    flex-shrink: 0;
    margin-top: 10px;
    transition: background 0.25s, border-color 0.25s;
  }

  .theme-switch::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: var(--toggle-knob);
    border-radius: 50%;
    transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }

  [data-theme="dark"] .theme-switch::after {
    transform: translateX(20px);
  }

  /* ---- Layout ---- */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: start;
    width: 100%;
  }

  @media (max-width: 720px) {
    .main-grid { grid-template-columns: 1fr; gap: 40px; }
    .header { margin-bottom: 48px; }
  }

  /* ---- Fields ---- */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 36px;
    width: 100%;
    min-width: 0;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .field-top label {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }

  .field-top .value-display {
    font-family: var(--font-mono);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.03em;
  }

  /* ---- Slider (shadcn) ---- */
  .slider-root {
    position: relative;
    height: 24px;
    display: flex;
    align-items: center;
    touch-action: none;
    user-select: none;
    cursor: pointer;
  }

  .slider-rail {
    position: absolute;
    left: 0; right: 0;
    height: 4px;
    background: var(--slider-track);
    border-radius: 2px;
  }

  .slider-fill {
    position: absolute;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    left: 0;
    transition: none;
  }

  .slider-knob {
    position: absolute;
    width: 18px;
    height: 18px;
    background: var(--slider-thumb-bg);
    border: 2px solid var(--slider-thumb-border);
    border-radius: 50%;
    cursor: grab;
    transform: translateX(-50%);
    z-index: 2;
    transition: box-shadow 0.15s;
  }

  .slider-knob:hover,
  .slider-knob:active {
    box-shadow: 0 0 0 5px var(--accent-soft);
  }

  .slider-knob:active { cursor: grabbing; }

  /* ---- Toggle Group (shadcn) ---- */
  .seg-control {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    background: var(--bg-input);
    padding: 3px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }

  .seg-item {
    background: transparent;
    border: none;
    border-radius: 4px;
    padding: 7px 2px;
    font-family: var(--font-sans);
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    letter-spacing: 0.01em;
  }

  .seg-item:hover { color: var(--text-secondary); }

  .seg-item.on {
    background: var(--bg-elevated);
    color: var(--text);
    box-shadow: var(--card-shadow), 0 0 0 1px var(--border);
  }

  .seg-item:active { transform: scale(0.97); }

  /* ---- Results Card ---- */
  .results {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--card-shadow);
    position: sticky;
    top: 24px;
  }

  .hero-stat {
    padding-bottom: 28px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--divider);
  }

  .hero-stat .label {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .hero-stat .number {
    font-family: var(--font-serif);
    font-size: clamp(2rem, 4vw, 2.8rem);
    font-weight: 400;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .rows {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .row .row-label {
    font-size: 0.82rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .row .row-val {
    font-family: var(--font-mono);
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  /* ---- Bar Chart ---- */
  .chart-block {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--divider);
  }

  .chart-block .chart-heading {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 18px;
  }

  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 100px;
  }

  .col {
    flex: 1;
    position: relative;
    min-height: 1px;
    cursor: default;
    border-radius: 2px 2px 0 0;
    overflow: hidden;
    transition: opacity 0.12s;
  }

  .col:hover { opacity: 0.6; }

  .col-interest {
    position: absolute;
    inset: 0;
    background: var(--bar-primary);
    border-radius: 2px 2px 0 0;
    opacity: 0.9;
  }

  .col-deposit {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    background: var(--bar-secondary);
  }

  .chart-foot {
    display: flex;
    gap: 18px;
    margin-top: 14px;
  }

  .chart-foot span {
    font-size: 0.68rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.02em;
  }

  .ldot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  /* ---- Tooltip ---- */
  .tip {
    position: fixed;
    background: var(--tooltip-bg);
    border: 1px solid var(--tooltip-border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    line-height: 1.8;
    color: var(--text);
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    opacity: 0;
    transition: opacity 0.1s;
  }

  .tip.show { opacity: 1; }

  .footer {
    margin-top: 48px;
    text-align: center;
  }

  .footer a {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: color 0.15s;
  }

  .footer a:hover {
    color: var(--text-secondary);
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback, useEffect, useMemo } = React;

/* ---- Slider ---- */
function Slider({ min, max, step, value, onChange }) {
  const ref = useRef(null);
  const active = useRef(false);
  const pct = ((value - min) / (max - min)) * 100;

  const resolve = useCallback((e) => {
    const r = ref.current.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const ratio = Math.max(0, Math.min(1, (cx - r.left) / r.width));
    const raw = min + ratio * (max - min);
    return Math.max(min, Math.min(max, Math.round(raw / step) * step));
  }, [min, max, step]);

  const move = useCallback((e) => {
    if (!active.current) return;
    e.preventDefault();
    onChange(resolve(e));
  }, [resolve, onChange]);

  const up = useCallback(() => {
    active.current = false;
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('touchend', up);
  }, [move]);

  const down = useCallback((e) => {
    active.current = true;
    onChange(resolve(e));
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('touchend', up);
  }, [resolve, onChange, move, up]);

  return (
    <div className="slider-root" ref={ref} onMouseDown={down} onTouchStart={down}>
      <div className="slider-rail" />
      <div className="slider-fill" style={{ width: pct + '%' }} />
      <div className="slider-knob" style={{ left: pct + '%' }} />
    </div>
  );
}

/* ---- Helpers ---- */
const currencies = [
  { code: 'EUR', symbol: '\u20ac' },
  { code: 'USD', symbol: '$' },
  { code: 'GBP', symbol: '\u00a3' },
  { code: 'JPY', symbol: '\u00a5' },
];

const fmt = n => Math.round(n).toLocaleString('en-US');

/* ---- App ---- */
function App() {
  const [theme, setTheme] = useState('dark');
  const [currency, setCurrency] = useState('EUR');
  const [principal, setPrincipal] = useState(10000);
  const [monthly, setMonthly] = useState(500);
  const [rate, setRate] = useState(7);
  const [years, setYears] = useState(20);
  const [freq, setFreq] = useState(12);
  const [tip, setTip] = useState({ on: false, x: 0, y: 0, lines: [] });

  const sym = currencies.find(c => c.code === currency).symbol;
  const money = n => sym + fmt(n);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  const freqs = [
    { label: 'Annual', v: 1 },
    { label: 'Quarterly', v: 4 },
    { label: 'Monthly', v: 12 },
    { label: 'Daily', v: 365 },
  ];

  const data = useMemo(() => {
    const out = [];
    let bal = principal;
    const r = rate / 100;
    for (let y = 1; y <= years; y++) {
      for (let p = 0; p < freq; p++) {
        bal *= (1 + r / freq);
        bal += monthly * (12 / freq);
      }
      const dep = principal + monthly * 12 * y;
      out.push({ year: y, balance: bal, deposited: dep, interest: bal - dep });
    }
    return out;
  }, [principal, monthly, rate, years, freq]);

  const last = data.length ? data[data.length - 1] : { balance: 0, deposited: 0, interest: 0 };
  const yieldPct = last.deposited > 0 ? (last.interest / last.deposited * 100) : 0;
  const peak = Math.max(...data.map(d => d.balance), 1);

  const bars = useMemo(() => {
    if (data.length <= 30) return data;
    const s = Math.ceil(data.length / 30);
    return data.filter((_, i) => i % s === 0 || i === data.length - 1);
  }, [data]);

  const tipOn = (e, d) => setTip({
    on: true,
    x: e.clientX + 14,
    y: e.clientY - 90,
    lines: [`Year ${d.year}`, `Balance  ${money(d.balance)}`, `Deposits ${money(d.deposited)}`, `Interest ${money(d.interest)}`]
  });
  const tipOff = () => setTip(t => ({ ...t, on: false }));

  return (
    <div className="app-root">
      <div className="header">
        <div className="header-text">
          <h1>Compound <em>Interest</em></h1>
          <p>Watch your money compound over time</p>
        </div>
        <button className="theme-switch" onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} aria-label="Toggle theme" />
      </div>

      <div className="main-grid">
        <div className="controls">
          <div className="field">
            <div className="field-top">
              <label>Initial Investment</label>
              <span className="value-display">{money(principal)}</span>
            </div>
            <Slider min={0} max={200000} step={1000} value={principal} onChange={setPrincipal} />
          </div>

          <div className="field">
            <div className="field-top">
              <label>Monthly Contribution</label>
              <span className="value-display">{money(monthly)}</span>
            </div>
            <Slider min={0} max={5000} step={50} value={monthly} onChange={setMonthly} />
          </div>

          <div className="field">
            <div className="field-top">
              <label>Annual Interest Rate</label>
              <span className="value-display">{rate.toFixed(1)}%</span>
            </div>
            <Slider min={0} max={15} step={0.1} value={rate} onChange={setRate} />
          </div>

          <div className="field">
            <div className="field-top">
              <label>Time Period</label>
              <span className="value-display">{years} years</span>
            </div>
            <Slider min={1} max={50} step={1} value={years} onChange={setYears} />
          </div>

          <div className="field">
            <div className="field-top">
              <label>Compound Frequency</label>
            </div>
            <div className="seg-control">
              {freqs.map(f => (
                <button key={f.v} className={`seg-item ${freq === f.v ? 'on' : ''}`} onClick={() => setFreq(f.v)}>
                  {f.label}
                </button>
              ))}
            </div>
          </div>

          <div className="field">
            <div className="field-top">
              <label>Currency</label>
            </div>
            <div className="seg-control seg-4">
              {currencies.map(c => (
                <button key={c.code} className={`seg-item ${currency === c.code ? 'on' : ''}`} onClick={() => setCurrency(c.code)}>
                  {c.symbol} {c.code}
                </button>
              ))}
            </div>
          </div>
        </div>

        <div className="results">
          <div className="hero-stat">
            <div className="label">Final Balance</div>
            <div className="number">{money(last.balance)}</div>
          </div>

          <div className="rows">
            <div className="row">
              <span className="row-label">
                <span className="dot" style={{ background: 'var(--bar-secondary)' }} />
                Total Deposits
              </span>
              <span className="row-val">{money(last.deposited)}</span>
            </div>
            <div className="row">
              <span className="row-label">
                <span className="dot" style={{ background: 'var(--bar-primary)' }} />
                Interest Earned
              </span>
              <span className="row-val">{money(last.interest)}</span>
            </div>
            <div className="row">
              <span className="row-label">
                <span className="dot" style={{ background: 'var(--text-muted)' }} />
                Effective Yield
              </span>
              <span className="row-val">{yieldPct.toFixed(1)}%</span>
            </div>
          </div>

          <div className="chart-block">
            <div className="chart-heading">Growth Over Time</div>
            <div className="chart-bars">
              {bars.map((d, i) => {
                const h = (d.balance / peak) * 100;
                const dh = (d.deposited / peak) * 100;
                return (
                  <div key={i} className="col" style={{ height: h + '%' }}
                    onMouseMove={e => tipOn(e, d)} onMouseLeave={tipOff}>
                    <div className="col-interest" />
                    <div className="col-deposit" style={{ height: Math.min(dh / h * 100, 100) + '%' }} />
                  </div>
                );
              })}
            </div>
            <div className="chart-foot">
              <span><span className="ldot" style={{ background: 'var(--bar-secondary)' }} /> Deposits</span>
              <span><span className="ldot" style={{ background: 'var(--bar-primary)', opacity: 0.9 }} /> Interest</span>
            </div>
          </div>
        </div>
      </div>

      <div className="footer">
        <a href="https://github.com/cozats/compound-interest" target="_blank" rel="noopener noreferrer">Source on GitHub</a>
      </div>

      <div className={`tip ${tip.on ? 'show' : ''}`} style={{ left: tip.x, top: tip.y }}>
        {tip.lines.map((l, i) => <div key={i}>{l}</div>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
